<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Portal</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .portal-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 15px 0; color: white; text-decoration: none; border-radius: 8px; font-size: 18px; font-weight: bold; box-sizing: border-box; }
        .btn-pos { background: #2c3e50; }
        .btn-erp { background: #16a085; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="portal-box">
        <h1>🏢 통합 사내 포털</h1>
        <p style="color: #666; margin-bottom: 30px;">접속하실 시스템을 선택해 주십시오.</p>
        
        <a href="/pos" class="btn btn-pos">🛒 POS 시스템 (매장용) 접속</a>
        <a href="/erp" class="btn btn-erp">📦 ERP 시스템 (물류용) 접속</a>
    </div>
</body>
</html>
